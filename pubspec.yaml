name: peeky
description: >-
  In-app network inspector for Flutter. Captures HTTP and Dio requests in a
  live, searchable panel. Tap or shake to open. Safe for production builds.
version: 0.0.3
homepage: https://github.com/Junaid-Haneef/peeky
repository: https://github.com/Junaid-Haneef/peeky
issue_tracker: https://github.com/Junaid-Haneef/peeky/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  dio: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

topics:
  - network
  - debugging
  - http
  - dio
  - inspector

flutter:

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
